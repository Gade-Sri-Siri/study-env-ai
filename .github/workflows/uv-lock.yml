name: Generate uv.lock

on:
  push:
    paths:
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate uv.lock
        run: uv lock

      - name: Commit uv.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --cached --quiet || git commit -m "chore: regenerate uv.lock"
          git push
